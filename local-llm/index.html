<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#080a0d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Local AI">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="./manifest.webmanifest">
  <title>Local AI</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080a0d;
      --panel: #10141a;
      --panel-2: #151b22;
      --text: #e9eef5;
      --muted: #96a1af;
      --accent: #52d273;
      --accent-2: #7db7ff;
      --border: #26303b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    body.shell {
      display: block;
      min-height: 100dvh;
      padding: 0;
      overflow: hidden;
    }

    main {
      width: min(100%, 480px);
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      padding: 22px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 22px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    .actions {
      display: grid;
      gap: 10px;
    }

    a,
    button {
      width: 100%;
      min-height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--text);
      font: inherit;
      text-decoration: none;
      cursor: pointer;
    }

    button.primary {
      border-color: var(--accent);
      color: var(--accent);
    }

    button.secondary {
      border-color: var(--accent-2);
      color: var(--accent-2);
    }

    button:disabled {
      cursor: default;
      opacity: 0.55;
    }

    #shell {
      height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr;
      background: var(--bg);
    }

    #bar {
      min-height: 44px;
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      gap: 8px;
      align-items: center;
      padding: max(8px, env(safe-area-inset-top)) 10px 8px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }

    #frameStatus {
      margin: 0;
      font-size: 12px;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #bar a,
    #bar button {
      width: auto;
      min-width: 44px;
      min-height: 34px;
      margin: 0;
      padding: 0 10px;
      font-size: 12px;
    }

    #clientFrame {
      width: 100%;
      height: 100%;
      border: 0;
      background: #101411;
    }

    [hidden] {
      display: none !important;
    }
  </style>
</head>
<body>
  <main id="launcher">
    <h1>Local AI</h1>
    <p id="status">Loading current tunnels...</p>
    <div class="actions">
      <button id="llama" class="primary" type="button" disabled>Llama Web UI</button>
      <button id="opencode" class="secondary" type="button" disabled>OpenCode Web UI</button>
    </div>
  </main>

  <section id="shell" hidden>
    <div id="bar">
      <button id="menu" type="button">Menu</button>
      <p id="frameStatus">Loading...</p>
      <a id="external" href="#" target="_blank" rel="noreferrer">Open</a>
      <button id="reload" type="button">Reload</button>
    </div>
    <iframe id="clientFrame" title="Local AI"></iframe>
  </section>

  <script>
    const services = {
      llama: {
        buttonId: "llama",
        label: "Llama Web UI",
        targetKey: "llamaUrl",
        fallbackKey: "url",
      },
      opencode: {
        buttonId: "opencode",
        label: "OpenCode Web UI",
        targetKey: "opencodeUrl",
      },
    };

    const launcherEl = document.getElementById("launcher");
    const shellEl = document.getElementById("shell");
    const statusEl = document.getElementById("status");
    const frameStatusEl = document.getElementById("frameStatus");
    const externalEl = document.getElementById("external");
    const reloadEl = document.getElementById("reload");
    const menuEl = document.getElementById("menu");
    const frameEl = document.getElementById("clientFrame");
    const serviceButtons = Object.fromEntries(Object.entries(services).map(([id, service]) => [
      id,
      document.getElementById(service.buttonId),
    ]));
    const rawTargetUrl = "https://raw.githubusercontent.com/ljste/ljste.github.io/main/local-llm/target.json";
    const apiTargetUrl = "https://api.github.com/repos/ljste/ljste.github.io/contents/local-llm/target.json?ref=main";
    const params = new URLSearchParams(window.location.search);
    const installMode = params.has("install");
    const requestedService = params.get("app");
    let currentTarget = null;
    let currentService = services[requestedService] ? requestedService : null;

    function isStandalone() {
      return window.navigator.standalone === true
        || window.matchMedia("(display-mode: standalone)").matches;
    }

    function setHistory(app) {
      const next = new URL(window.location.href);
      next.searchParams.set("install", "1");

      if (app) {
        next.searchParams.set("app", app);
      } else {
        next.searchParams.delete("app");
      }

      window.history.replaceState(null, "", next);
    }

    function serviceUrl(target, service) {
      const url = target?.[service.targetKey] || target?.[service.fallbackKey];
      if (!url) {
        throw new Error(`${service.label} tunnel is not published yet.`);
      }

      const parsed = new URL(url);
      if (parsed.protocol !== "https:") {
        throw new Error(`${service.label} tunnel must use HTTPS.`);
      }

      return parsed;
    }

    function setLauncherState(message, disabled = false) {
      statusEl.textContent = message;
      for (const button of Object.values(serviceButtons)) {
        button.disabled = disabled;
      }
    }

    async function fetchJson(url) {
      const response = await fetch(`${url}${url.includes("?") ? "&" : "?"}t=${Date.now()}`, {
        cache: "no-store",
        headers: { "accept": "application/json" },
      });

      if (!response.ok) {
        throw new Error(`${url} returned HTTP ${response.status}`);
      }

      return response.json();
    }

    async function fetchApiTarget() {
      const payload = await fetchJson(apiTargetUrl);

      if (payload.encoding !== "base64" || typeof payload.content !== "string") {
        throw new Error("GitHub API returned an unexpected target payload.");
      }

      return JSON.parse(atob(payload.content.replace(/\s/g, "")));
    }

    async function fetchTarget() {
      const errors = [];
      const loaders = [
        () => fetchJson(rawTargetUrl),
        fetchApiTarget,
        () => fetchJson("./target.json"),
      ];

      for (const load of loaders) {
        try {
          return await load();
        } catch (error) {
          errors.push(error.message);
        }
      }

      throw new Error(errors.join(" | "));
    }

    async function refreshTarget() {
      currentTarget = await fetchTarget();
      serviceUrl(currentTarget, services.llama);
      serviceUrl(currentTarget, services.opencode);
      setLauncherState(
        currentTarget.updatedAt
          ? `Updated ${new Date(currentTarget.updatedAt).toLocaleString()}.`
          : "Choose a client.",
      );
      return currentTarget;
    }

    async function openService(id) {
      const service = services[id];
      if (!service) return;

      currentService = id;
      setHistory(id);
      document.body.classList.add("shell");
      launcherEl.hidden = true;
      shellEl.hidden = false;
      frameStatusEl.textContent = `Loading ${service.label}...`;

      try {
        const target = currentTarget || await refreshTarget();
        const url = serviceUrl(target, service);
        externalEl.href = url.href;
        frameEl.src = url.href;
        frameStatusEl.textContent = service.label;
      } catch (error) {
        frameEl.removeAttribute("src");
        frameStatusEl.textContent = error.message;
      }
    }

    async function showLauncher() {
      currentService = null;
      setHistory(null);
      frameEl.removeAttribute("src");
      shellEl.hidden = true;
      launcherEl.hidden = false;
      document.body.classList.remove("shell");
      setLauncherState("Loading current tunnels...", true);

      try {
        await refreshTarget();
      } catch (error) {
        setLauncherState(error.message, true);
      }
    }

    reloadEl.addEventListener("click", () => openService(currentService));
    menuEl.addEventListener("click", showLauncher);

    for (const [id, button] of Object.entries(serviceButtons)) {
      button.addEventListener("click", () => openService(id));
    }

    if (installMode && currentService && isStandalone()) {
      refreshTarget().then(() => openService(currentService)).catch((error) => {
        frameStatusEl.textContent = error.message;
      });
    } else if (installMode && currentService) {
      refreshTarget().then(() => openService(currentService)).catch((error) => {
        setLauncherState(error.message, true);
      });
    } else {
      showLauncher();
    }
  </script>
</body>
</html>
