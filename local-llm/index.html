<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#080a0d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Local LLM">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="./manifest.webmanifest">
  <title>Local LLM</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080a0d;
      --panel: #10141a;
      --text: #e9eef5;
      --muted: #96a1af;
      --accent: #52d273;
      --border: #26303b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    body.shell {
      display: block;
      min-height: 100dvh;
      padding: 0;
      overflow: hidden;
    }

    main {
      width: min(100%, 480px);
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      padding: 22px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 22px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    a,
    button {
      width: 100%;
      min-height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--accent);
      border-radius: 6px;
      background: transparent;
      color: var(--accent);
      font: inherit;
      text-decoration: none;
      cursor: pointer;
    }

    button {
      margin-top: 10px;
      border-color: var(--border);
      color: var(--text);
    }

    #shell {
      height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr;
      background: var(--bg);
    }

    #bar {
      min-height: 44px;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: center;
      padding: max(8px, env(safe-area-inset-top)) 10px 8px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }

    #frameStatus {
      margin: 0;
      font-size: 12px;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #bar a,
    #bar button {
      width: auto;
      min-width: 44px;
      min-height: 34px;
      margin: 0;
      padding: 0 10px;
      font-size: 12px;
    }

    #llmFrame {
      width: 100%;
      height: 100%;
      border: 0;
      background: #101411;
    }

    [hidden] {
      display: none !important;
    }
  </style>
</head>
<body>
  <main id="launcher">
    <h1>Local LLM</h1>
    <p id="status">Finding the current tunnel...</p>
    <a id="open" href="#" rel="noreferrer" hidden>Open current tunnel</a>
    <button id="retry" type="button" hidden>Retry</button>
  </main>

  <section id="shell" hidden>
    <div id="bar">
      <p id="frameStatus">Finding the current tunnel...</p>
      <a id="external" href="#" target="_blank" rel="noreferrer">Open</a>
      <button id="reload" type="button">Reload</button>
    </div>
    <iframe id="llmFrame" title="Local LLM"></iframe>
  </section>

  <script>
    const launcherEl = document.getElementById("launcher");
    const shellEl = document.getElementById("shell");
    const statusEl = document.getElementById("status");
    const openEl = document.getElementById("open");
    const retryEl = document.getElementById("retry");
    const frameStatusEl = document.getElementById("frameStatus");
    const externalEl = document.getElementById("external");
    const reloadEl = document.getElementById("reload");
    const frameEl = document.getElementById("llmFrame");
    const rawTargetUrl = "https://raw.githubusercontent.com/ljste/ljste.github.io/main/local-llm/target.json";
    const apiTargetUrl = "https://api.github.com/repos/ljste/ljste.github.io/contents/local-llm/target.json?ref=main";
    const params = new URLSearchParams(window.location.search);
    const installMode = params.has("install");
    const forceOpen = params.has("open");

    function isStandalone() {
      return window.navigator.standalone === true
        || window.matchMedia("(display-mode: standalone)").matches;
    }

    function shouldAutoOpen() {
      return forceOpen || !installMode || isStandalone();
    }

    function shouldUseShell() {
      return installMode && isStandalone() && !forceOpen;
    }

    function setFailure(message) {
      statusEl.textContent = message;
      openEl.hidden = true;
      retryEl.hidden = false;
    }

    function setShellFailure(message) {
      frameStatusEl.textContent = message;
      frameEl.removeAttribute("src");
    }

    async function fetchJson(url) {
      const response = await fetch(`${url}${url.includes("?") ? "&" : "?"}t=${Date.now()}`, {
        cache: "no-store",
        headers: { "accept": "application/json" },
      });

      if (!response.ok) {
        throw new Error(`${url} returned HTTP ${response.status}`);
      }

      return response.json();
    }

    async function fetchApiTarget() {
      const payload = await fetchJson(apiTargetUrl);

      if (payload.encoding !== "base64" || typeof payload.content !== "string") {
        throw new Error("GitHub API returned an unexpected target payload.");
      }

      return JSON.parse(atob(payload.content.replace(/\s/g, "")));
    }

    async function fetchTarget() {
      const errors = [];
      const loaders = [
        () => fetchJson(rawTargetUrl),
        fetchApiTarget,
        () => fetchJson("./target.json"),
      ];

      for (const load of loaders) {
        try {
          return await load();
        } catch (error) {
          errors.push(error.message);
        }
      }

      throw new Error(errors.join(" | "));
    }

    async function loadCurrentTunnel() {
      const target = await fetchTarget();
      const url = new URL(target.url);

      if (url.protocol !== "https:") {
        throw new Error("Target must use HTTPS.");
      }

      return { target, url };
    }

    async function openCurrentTunnel() {
      const autoOpen = shouldAutoOpen();

      retryEl.hidden = true;
      openEl.hidden = true;
      statusEl.textContent = installMode && !autoOpen
        ? "Ready to save. The button below opens the current tunnel."
        : "Finding the current tunnel...";

      try {
        const { target, url } = await loadCurrentTunnel();

        openEl.href = url.href;
        openEl.hidden = false;

        if (autoOpen) {
          statusEl.textContent = target.updatedAt
            ? `Opening tunnel updated ${new Date(target.updatedAt).toLocaleString()}...`
            : "Opening current tunnel...";
          window.setTimeout(() => window.location.replace(url.href), 350);
        } else {
          statusEl.textContent = target.updatedAt
            ? `Ready. Current tunnel updated ${new Date(target.updatedAt).toLocaleString()}.`
            : "Ready. Current tunnel is available.";
        }
      } catch (error) {
        setFailure(`No live tunnel target is published yet. ${error.message}`);
      }
    }

    async function loadShell() {
      document.body.classList.add("shell");
      launcherEl.hidden = true;
      shellEl.hidden = false;

      try {
        const { target, url } = await loadCurrentTunnel();
        externalEl.href = url.href;
        frameEl.src = url.href;
        frameStatusEl.textContent = target.updatedAt
          ? `Current tunnel updated ${new Date(target.updatedAt).toLocaleString()}`
          : "Current tunnel loaded.";
      } catch (error) {
        setShellFailure(`No live tunnel target. ${error.message}`);
      }
    }

    reloadEl.addEventListener("click", loadShell);
    retryEl.addEventListener("click", openCurrentTunnel);

    if (shouldUseShell()) {
      loadShell();
    } else {
      openCurrentTunnel();
    }
  </script>
</body>
</html>
